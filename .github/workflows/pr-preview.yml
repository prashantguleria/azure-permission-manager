name: PR Staging Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: staging-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  staging:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: azure-user-role-manager
        run: yarn install --immutable

      - name: Build for staging
        working-directory: azure-user-role-manager
        run: yarn build --configuration production --base-href /azure-permission-manager/staging/pr-${{ github.event.pull_request.number }}/

      - name: Deploy to gh-pages (staging subdirectory)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: azure-user-role-manager/dist/azure-user-role-manager/browser
          target-folder: staging/pr-${{ github.event.pull_request.number }}

      - name: Comment PR with staging URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${{ github.repository_owner }}.github.io/azure-permission-manager/staging/pr-${{ github.event.pull_request.number }}/`;
            const body = `### Staging Preview

            Deployed to: ${url}

            _Updated on ${new Date().toISOString()}_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Staging Preview')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove staging directory
        run: |
          rm -rf staging/pr-${{ github.event.pull_request.number }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Clean up staging for PR #${{ github.event.pull_request.number }}"
          git push
