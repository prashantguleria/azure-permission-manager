name: CI Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: azure-user-role-manager
        run: yarn install --immutable

      - name: Build
        working-directory: azure-user-role-manager
        run: yarn build --configuration production --base-href /azure-permission-manager/
