name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: azure-user-role-manager
        run: yarn install --immutable

      - name: Build
        working-directory: azure-user-role-manager
        run: yarn build --configuration production --base-href /azure-permission-manager/

      - name: Deploy to gh-pages (root)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: azure-user-role-manager/dist/azure-user-role-manager/browser
          clean-exclude: staging
