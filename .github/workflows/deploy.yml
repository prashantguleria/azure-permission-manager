name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: azure-user-role-manager
        run: yarn install --immutable

      - name: Build
        working-directory: azure-user-role-manager
        run: yarn build --configuration production --base-href /azure-permission-manager/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: azure-user-role-manager/dist/azure-user-role-manager/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
