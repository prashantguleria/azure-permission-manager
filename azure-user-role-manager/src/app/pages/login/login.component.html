<div class="login-container">
  <div class="login-card-wrapper">
    <p-card class="login-card">
      <div class="login-header">
        <div class="logo-section">
          <i class="pi pi-shield logo-icon"></i>
          <h1 class="app-title">Azure User Role Manager</h1>
        </div>
        <p class="app-description">
          Manage user roles and permissions across your Azure Active Directory tenants
        </p>
      </div>

      <p-divider></p-divider>

      <div class="login-content">
        <div class="login-info">
          <h3>Sign in to continue</h3>
          <p class="text-secondary">
            Use your Azure Active Directory credentials to access the role management portal
          </p>
        </div>

        <div class="login-actions">
          <p-button 
            label="Sign in with Microsoft"
            icon="pi pi-sign-in"
            styleClass="w-full"
            size="large"
            [loading]="isLoading"
            (onClick)="login()">
          </p-button>
        </div>

        <div class="login-features">
          <div class="feature-item">
            <i class="pi pi-lock"></i>
            <span>Secure Azure AD Authentication</span>
          </div>
          <div class="feature-item">
            <i class="pi pi-users"></i>
            <span>Multi-tenant Support</span>
          </div>
          <div class="feature-item">
            <i class="pi pi-file-check"></i>
            <span>Comprehensive Audit Logging</span>
          </div>
        </div>
      </div>
    </p-card>
  </div>
</div>
