<!-- Main Layout for authenticated pages -->
<div *ngIf="showMainLayout; else standaloneLayout">
  <div class="app-layout">
    <!-- Top Navbar -->
    <div class="top-navbar">
      <div class="navbar-content">
        <!-- Left section: Burger menu and branding -->
        <div class="navbar-left">
          <span class="burger-menu" (click)="isCollapsed = !isCollapsed">
            <i class="pi" [class]="isCollapsed ? 'pi-bars' : 'pi-times'"></i>
          </span>
          <div class="brand-section">
            <i class="pi pi-shield brand-logo"></i>
            <span class="brand-name">Azure User Role Manager</span>
          </div>
        </div>
        
        <!-- Right section: User info + Logout -->
        <div class="navbar-right" *ngIf="currentUser">
          <p-avatar [label]="utilityService.getUserInitials(currentUser.name)" size="normal" shape="circle"></p-avatar>
          <span class="user-name">{{ currentUser.name || 'User' }}</span>
          <p-button icon="pi pi-sign-out" (onClick)="logout()" [text]="true" size="small" class="logout-btn">
            Logout
          </p-button>
        </div>
      </div>
    </div>
    
    <!-- Main Content Area with Fixed Sidebar -->
    <div class="main-content-wrapper">
      <!-- Sidebar -->
      <div class="menu-sidebar" [style.width]="isCollapsed ? '80px' : '256px'">
        <div class="sidebar-menu">
          <div class="menu-item" routerLinkActive="active">
            <a routerLink="/app/tenants" class="menu-link">
              <i class="pi pi-building"></i>
              <span *ngIf="!isCollapsed">Tenants</span>
            </a>
          </div>
          <div class="menu-item" routerLinkActive="active">
            <a routerLink="/app/user-management" class="menu-link">
              <i class="pi pi-users"></i>
              <span *ngIf="!isCollapsed">User Management</span>
            </a>
          </div>
          <div class="menu-item" routerLinkActive="active">
            <a routerLink="/app/storage-accounts" class="menu-link">
              <i class="pi pi-database"></i>
              <span *ngIf="!isCollapsed">Storage Accounts</span>
            </a>
          </div>
          <div class="menu-item" routerLinkActive="active">
            <a routerLink="/app/audit-logs" class="menu-link">
              <i class="pi pi-file-edit"></i>
              <span *ngIf="!isCollapsed">Audit Logs</span>
            </a>
          </div>
        </div>
      </div>
      
      <!-- Main Content -->
      <div class="main-content" [style.margin-left]="isCollapsed ? '80px' : '256px'">
        <div class="inner-content">
          <!-- Breadcrumbs moved here -->
          <div class="breadcrumb-container" *ngIf="breadcrumbs.length > 0">
            <p-breadcrumb [model]="breadcrumbItems" class="page-breadcrumb"></p-breadcrumb>
          </div>
          
          <router-outlet></router-outlet>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Standalone Layout for login and tenant selection -->
<ng-template #standaloneLayout>
  <router-outlet></router-outlet>
</ng-template>
